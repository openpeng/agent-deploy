apiVersion: v1
kind: Service
metadata:
  name: agent-deploy
  namespace: default
  labels:
    app: agent-deploy
spec:
  type: ClusterIP
  selector:
    app: agent-deploy
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
# Optional: Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-deploy
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: agent-deploy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-deploy
                port:
                  number: 3000
