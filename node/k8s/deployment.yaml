apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-deploy
  namespace: default
  labels:
    app: agent-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-deploy
  template:
    metadata:
      labels:
        app: agent-deploy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: agent-deploy
          image: agent-deploy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-deploy-config
          env:
            - name: MARKET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-deploy-secrets
                  key: MARKET_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - agent-deploy
                topologyKey: kubernetes.io/hostname
