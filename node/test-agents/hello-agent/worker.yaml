pipeline:
  - step: greet
    tool: write_file
    args:
      path: output.txt
      content: "Hello from {{name}}!"
    output: write_result

  - step: read_greeting
    tool: read_file
    args:
      path: output.txt
    output: greeting

  - step: show_result
    tool: bash
    args:
      command: cat output.txt
