version: "3.8"

services:
  agent-deploy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-deploy
    ports:
      - "3000:3000"
    environment:
      - TRANSPORT=http
      - PORT=3000
      - NODE_ENV=production
      - DEBUG=${DEBUG:-false}
      - MARKET_API_URL=${MARKET_API_URL:-http://localhost:8321}
      - MARKET_API_KEY=${MARKET_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - agent-network
    # Optional: mount local agents directory
    # volumes:
    #   - ./agents:/app/agents:ro

  # Optional Redis cache for session resumability
  redis:
    image: redis:7-alpine
    container_name: agent-deploy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - agent-network

  # Optional PostgreSQL for persistent state
  postgres:
    image: postgres:16-alpine
    container_name: agent-deploy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentdeploy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: agentdeploy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
